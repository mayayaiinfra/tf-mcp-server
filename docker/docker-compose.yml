version: '3.8'

services:
  thunderfire-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - THUNDERFIRE_API_URL=${THUNDERFIRE_API_URL:-http://top:8080}
      - THUNDERFIRE_API_KEY=${THUNDERFIRE_API_KEY}
      - THUNDERFIRE_TIMEOUT=${THUNDERFIRE_TIMEOUT:-30000}
      - THUNDERFIRE_DEBUG=${THUNDERFIRE_DEBUG:-false}
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - top

  # Optional: Run alongside TOP
  top:
    image: thunderfire/top:latest
    ports:
      - "8080:8080"
    environment:
      - TOP_PORT=8080
    restart: unless-stopped
